<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Instrument</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">École de Musique</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/instruments">Instruments</a></li>
                <li class="nav-item"><a class="nav-link" href="/profs">Professeurs</a></li>
                <li class="nav-item"><a class="nav-link" href="/cours">Cours</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <h2 th:text="${instrument.id == null ? 'Nouvel Instrument' : 'Modifier Instrument'}"></h2>
    
    <form th:action="@{/instruments/save}" th:object="${instrument}" method="post" class="mt-4" style="max-width: 500px;">
        <input type="hidden" th:field="*{id}">
        
        <div class="mb-3">
            <label class="form-label">Nom</label>
            <input type="text" th:field="*{nom}" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Famille</label>
            <input type="text" th:field="*{famille}" class="form-control" required>
        </div>
        
        <div class="mb-3 form-check">
            <input type="checkbox" th:field="*{disponibilite}" class="form-check-input">
            <label class="form-check-label">Disponible</label>
        </div>
        
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="/instruments" class="btn btn-secondary">Annuler</a>
    </form>
</div>
</body>
</html>
