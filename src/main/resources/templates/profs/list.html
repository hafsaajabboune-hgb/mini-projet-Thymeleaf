<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Professeurs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">École de Musique</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/instruments">Instruments</a></li>
                <li class="nav-item"><a class="nav-link" href="/profs">Professeurs</a></li>
                <li class="nav-item"><a class="nav-link" href="/cours">Cours</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <h2>Liste des Professeurs</h2>
    
    <a href="/profs/new" class="btn btn-success mb-3">Ajouter un Professeur</a>
    
    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Spécialité</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="prof : ${profs}">
            <td th:text="${prof.id}"></td>
            <td th:text="${prof.nom}"></td>
            <td th:text="${prof.specialite}"></td>
            <td>
                <a th:href="@{/profs/edit/{id}(id=${prof.id})}" class="btn btn-sm btn-primary">Modifier</a>
                <a th:href="@{/profs/delete/{id}(id=${prof.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Êtes-vous sûr ?')">Supprimer</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
