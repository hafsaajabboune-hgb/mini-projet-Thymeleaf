<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cours</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">École de Musique</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/instruments">Instruments</a></li>
                <li class="nav-item"><a class="nav-link" href="/profs">Professeurs</a></li>
                <li class="nav-item"><a class="nav-link" href="/cours">Cours</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <h2>Liste des Cours</h2>
    
    <form class="row g-3 mb-4" action="/cours" method="get">
        <div class="col-auto">
            <input type="text" name="niveau" class="form-control" placeholder="Niveau" th:value="${niveau}">
        </div>
        <div class="col-auto">
            <select name="jour" class="form-select">
                <option value="">-- Jour --</option>
                <option value="Lundi" th:selected="${jour == 'Lundi'}">Lundi</option>
                <option value="Mardi" th:selected="${jour == 'Mardi'}">Mardi</option>
                <option value="Mercredi" th:selected="${jour == 'Mercredi'}">Mercredi</option>
                <option value="Jeudi" th:selected="${jour == 'Jeudi'}">Jeudi</option>
                <option value="Vendredi" th:selected="${jour == 'Vendredi'}">Vendredi</option>
                <option value="Samedi" th:selected="${jour == 'Samedi'}">Samedi</option>
                <option value="Dimanche" th:selected="${jour == 'Dimanche'}">Dimanche</option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-secondary">Filtrer</button>
            <a href="/cours" class="btn btn-outline-secondary">Reset</a>
        </div>
    </form>
    
    <a href="/cours/new" class="btn btn-success mb-3">Planifier un Cours</a>
    
    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Jour</th>
            <th>Heure Début</th>
            <th>Durée (min)</th>
            <th>Niveau</th>
            <th>Professeur</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cours : ${cours}">
            <td th:text="${cours.id}"></td>
            <td th:text="${cours.jour}"></td>
            <td th:text="${cours.heureDebut}"></td>
            <td th:text="${cours.dureeMin}"></td>
            <td th:text="${cours.niveau}"></td>
            <td th:text="${cours.prof != null ? cours.prof.nom : 'Non assigné'}"></td>
            <td>
                <a th:href="@{/cours/edit/{id}(id=${cours.id})}" class="btn btn-sm btn-primary">Modifier</a>
                <a th:href="@{/cours/delete/{id}(id=${cours.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Êtes-vous sûr ?')">Supprimer</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
