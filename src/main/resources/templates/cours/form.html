<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cours</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">École de Musique</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/instruments">Instruments</a></li>
                <li class="nav-item"><a class="nav-link" href="/profs">Professeurs</a></li>
                <li class="nav-item"><a class="nav-link" href="/cours">Cours</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <h2 th:text="${cours.id == null ? 'Planifier un Cours' : 'Modifier le Cours'}"></h2>
    
    <form th:action="@{/cours/save}" th:object="${cours}" method="post" class="mt-4" style="max-width: 500px;">
        <input type="hidden" th:field="*{id}">
        
        <div class="mb-3">
            <label class="form-label">Jour</label>
            <select th:field="*{jour}" class="form-select" required>
                <option value="Lundi">Lundi</option>
                <option value="Mardi">Mardi</option>
                <option value="Mercredi">Mercredi</option>
                <option value="Jeudi">Jeudi</option>
                <option value="Vendredi">Vendredi</option>
                <option value="Samedi">Samedi</option>
                <option value="Dimanche">Dimanche</option>
            </select>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Heure de début (HH:mm)</label>
            <input type="time" th:field="*{heureDebut}" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Durée (minutes)</label>
            <input type="number" th:field="*{dureeMin}" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Niveau</label>
            <input type="text" th:field="*{niveau}" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Professeur</label>
            <select th:field="*{prof.id}" class="form-select">
                <option value="">-- Sélectionner un Professeur --</option>
                <option th:each="p : ${profs}" th:value="${p.id}" th:text="${p.nom}"></option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="/cours" class="btn btn-secondary">Annuler</a>
    </form>
</div>
</body>
</html>
